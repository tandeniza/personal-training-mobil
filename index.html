<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym of Legends | Gym of Legends</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010409; --sidebar: #0d1117; --primary: #38bdf8;
            --surface: rgba(22, 27, 34, 0.98); --border: rgba(255, 255, 255, 0.1);
            --text: #f0f6fc; --text-dim: #8b949e; --success: #238636; --danger: #da3633;
        }

        /* --- NATIVE LOCK ENGINE (KRİTİK ALAN) --- */
        html, body { 
            overscroll-behavior: none !important; /* Yenilemeyi %100 durdurur */
            overflow: hidden !important; 
            height: 100% !important; width: 100% !important; 
            position: fixed; 
            top: 0; left: 0;
            touch-action: none; /* Sayfa geneli dokunmatik hareketleri kilitler */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

        /* Üst Sabit Bar */
        .mobile-bar { height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 2000; flex-shrink: 0; touch-action: none; }
        .toggle-btn { color: var(--primary); font-size: 1.5rem; cursor: pointer; }

        /* Sidebar */
        aside { position: fixed; left: -280px; top: 0; height: 100%; width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; z-index: 3000; touch-action: pan-y; }
        aside.open { left: 0; box-shadow: 20px 0 50px #000; }
        .m-card { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .m-card.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }

        /* Ana Gövde */
        main { flex: 1; display: none; flex-direction: column; overflow: hidden; position: relative; }

        /* Sabitlenen Bilgi ve Günler */
        .fixed-top-box { background: var(--bg); z-index: 1500; padding: 15px 15px 5px 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; touch-action: none; }
        .nav-tabs { display: flex; background: #111827; padding: 4px; border-radius: 12px; border: 1px solid var(--border); gap: 2px; overflow-x: auto; margin-bottom: 12px; }
        .tab-btn { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); border:none; background:none; white-space: nowrap; flex: 1; }
        .tab-btn.active { background: var(--primary); color: #000; }

        .day-scroller { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; touch-action: pan-x; }
        .day-chip { padding: 12px 18px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; font-size: 0.75rem; font-weight: 800; white-space: nowrap; color: var(--text); }
        .day-chip.active { background: #fff; color: #000; }

        /* SADECE BURASI KAYABİLİR (SCROLL ZONE) */
        .scroll-zone { 
            flex: 1; overflow-y: auto; padding: 15px; 
            -webkit-overflow-scrolling: touch; 
            touch-action: pan-y; /* Sadece dikey kaydırmaya izin ver */
            overscroll-behavior: contain;
        }

        .pro-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 20px; }
        .data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 18px; margin-bottom: 12px; }
        .data-row div:nth-child(1), .data-row div:nth-child(2) { grid-column: span 2; }
        
        input, select, textarea { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; outline: none; font-size: 0.95rem; width: 100%; }
        label { font-size: 0.6rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }

        .btn-p { background: var(--primary); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-wa { background: #238636; color: #fff; padding: 15px; border-radius: 12px; border: none; font-weight: 800; width: 100%; margin-top: 10px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; touch-action: none; }
        .modal { background: var(--sidebar); border: 1px solid var(--primary); padding: 25px; border-radius: 24px; width: 90%; max-width: 380px; }

        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-bar">
    <div class="toggle-btn" onclick="toggleSidebar(true)">☰</div>
    <div style="font-weight: 800; color: var(--primary); font-size: 0.9rem;">GYM OF LEGENDS</div>
    <div style="width: 40px;"></div>
</div>

<aside id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--primary); font-size:1.1rem;">GOL OS v36</h2>
        <div onclick="toggleSidebar(false)" style="color:var(--danger); font-weight:800; padding:10px;">✕</div>
    </div>
    <button class="btn-p" onclick="toggleModal(true)" style="margin-top:20px;">+ ÜYE EKLE</button>
    <div class="member-stack" id="mList"></div>
</aside>

<main id="mainPanel">
    <div class="fixed-top-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h1 id="activeMemberTitle" style="font-size: 1.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;">...</h1>
            <p id="vol-badge" style="color:var(--primary); font-size:0.6rem; font-weight:900;">VOL: 0 KG</p>
        </div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('workout', this)">ANTRENMAN</button>
            <button class="tab-btn" onclick="switchTab('nutrition', this)">BESLENME</button>
            <button class="tab-btn" onclick="switchTab('measures', this)">ÖLÇÜLER</button>
            <button class="tab-btn" onclick="switchTab('biz', this)">İŞLETME</button>
        </div>

        <div class="day-scroller" id="dayHub"></div>
    </div>

    <div class="scroll-zone">
        <div id="workout-view" class="tab-pane">
            <div class="pro-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="font-size: 0.9rem;">PROGRAM</h3>
                    <button class="btn-p" style="width:auto; padding:8px 15px; font-size:0.7rem;" onclick="addExcRow()">+ EKLE</button>
                </div>
                <div id="excStack"></div>
            </div>
        </div>

        <div id="nutrition-view" class="tab-pane hidden">
            <div class="pro-panel">
                <h3>BESLENME</h3>
                <div id="mealStack"></div>
                <button class="btn-p" style="margin-top:15px;" onclick="addMealRow()">+ ÖĞÜN EKLE</button>
            </div>
        </div>

        <div id="measures-view" class="tab-pane hidden">
            <div class="pro-panel">
                <h3>ÖLÇÜLER</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                    <div><label>OMUZ</label><input type="text" id="o-sh" oninput="save()"></div>
                    <div><label>BEL</label><input type="text" id="o-wa" oninput="save()"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <div style="height:180px; background:#000; border-radius:15px; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden;" onclick="setPic('before')">
                        <img id="img-before" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
                        <p style="font-size:0.5rem; color:var(--text-dim);">ÖNCESİ</p>
                    </div>
                    <div style="height:180px; background:#000; border-radius:15px; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden;" onclick="setPic('after')">
                        <img id="img-after" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
                        <p style="font-size:0.5rem; color:var(--text-dim);">SONRASI</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="biz-view" class="tab-pane hidden">
            <div class="pro-panel">
                <h3>İŞLETME</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>DERS</label><input type="number" id="f-sess" oninput="save()"></div>
                    <div><label>DURUM</label><select id="f-stat" onchange="save()"><option>ÖDENDİ</option><option>BORÇLU</option></select></div>
                </div>
            </div>
        </div>

        <div class="pro-panel">
            <div style="height:140px; margin-bottom:15px;"><canvas id="mainChart"></canvas></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
                <div><label>KİLO</label><input type="text" id="s-w" onchange="pushW()"></div>
                <div><label>BOY</label><input type="text" id="s-h" onchange="save()"></div>
            </div>
            <textarea id="coachNotes" rows="4" placeholder="Koç Notları..." oninput="save()"></textarea>
            <button class="btn-wa" onclick="shareWA()">WHATSAPP İLE GÖNDER</button>
        </div>
    </div>
</main>

<div class="modal-overlay" id="regModal">
    <div class="modal">
        <h2 style="color:var(--primary); font-size:1.1rem; margin-bottom:15px;">Yeni Kayıt</h2>
        <input type="text" id="reg-name" placeholder="Ad Soyad" style="margin-bottom:10px;">
        <input type="number" id="reg-w" placeholder="Kilo" style="margin-bottom:15px;">
        <button class="btn-p" onclick="confirmRegister()">BAŞLAT</button>
        <button onclick="toggleModal(false)" style="background:none; border:none; color:#fff; width:100%; margin-top:10px; font-size:0.7rem;">İPTAL</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('gym_v36_native')) || {};
    let actId = null, actDay = "Pazartesi", chart = null;
    const days = ["Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"];
    const regs = ["Göğüs", "Sırt", "Omuz", "Bacak", "Biceps", "Triceps", "Karın", "OFF"];

    function toggleSidebar(s) { document.getElementById('sidebar').classList.toggle('open', s); }
    function toggleModal(s) { document.getElementById('regModal').style.display = s ? 'flex' : 'none'; }

    function confirmRegister() {
        const name = document.getElementById('reg-name').value;
        if(!name) return;
        const id = 'L' + Date.now();
        db[id] = { name, notes:"", stats:{h:'', w:document.getElementById('reg-w').value}, biz:{sess:12, stat:'ÖDENDİ'}, measures:{sh:'', wa:''}, history:[], photos:{}, days: days.reduce((a,d)=>({...a, [d]:{exc:[], meals:[]}}), {}) };
        if(db[id].stats.w) db[id].history.push(parseFloat(db[id].stats.w));
        saveDB(); toggleModal(false); drawMembers(); mount(id);
    }

    function drawMembers() {
        const c = document.getElementById('mList'); c.innerHTML = '';
        Object.keys(db).forEach(id => {
            const d = document.createElement('div');
            d.className = `m-card ${actId === id ? 'active' : ''}`;
            d.innerHTML = `<b>${db[id].name.toUpperCase()}</b> <span onclick="deleteM(event,'${id}')">✕</span>`;
            d.onclick = () => { mount(id); toggleSidebar(false); };
            c.appendChild(d);
        });
    }

    function mount(id) {
        actId = id; document.getElementById('mainPanel').style.display = 'flex';
        const m = db[id];
        document.getElementById('activeMemberTitle').innerText = m.name;
        document.getElementById('coachNotes').value = m.notes || "";
        document.getElementById('s-h').value = m.stats.h || "";
        document.getElementById('s-w').value = m.stats.w || "";
        document.getElementById('f-sess').value = m.biz.sess || 12;
        document.getElementById('f-stat').value = m.biz.stat || 'ÖDENDİ';
        document.getElementById('o-sh').value = m.measures.sh || "";
        document.getElementById('o-wa').value = m.measures.wa || "";
        updatePics(); renderDays(); load(); buildChart(); drawMembers();
    }

    function renderDays() {
        const c = document.getElementById('dayHub');
        c.innerHTML = days.map(d => `<div class="day-chip ${actDay === d ? 'active' : ''}" onclick="switchDay('${d}')">${d}</div>`).join('');
    }

    function switchDay(d) { save(); actDay = d; renderDays(); load(); }

    function switchTab(t, b) {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(x => x.classList.add('hidden'));
        document.getElementById(t + '-view').classList.remove('hidden');
    }

    function addExcRow(data = {r:'Göğüs', n:'', s:'', t:'', a:''}) {
        const c = document.getElementById('excStack');
        const r = document.createElement('div');
        r.className = 'data-row';
        r.innerHTML = `
            <div><label>Bölge</label><select class="e-r">${regs.map(x=>`<option ${data.r==x?'selected':''}>${x}</option>`).join('')}</select></div>
            <div><label>Hareket</label><input type="text" class="e-n" value="${data.n}"></div>
            <div><label>Set</label><input type="number" class="e-s" value="${data.s}"></div>
            <div><label>Tek</label><input type="number" class="e-t" value="${data.t}"></div>
            <div><label>Kg</label><input type="number" class="e-a" value="${data.a}"></div>
            <button onclick="this.parentElement.remove(); save();" style="background:none; border:none; color:var(--danger); font-weight:800;">✕</button>
        `;
        c.appendChild(r);
        r.querySelectorAll('input, select').forEach(i => i.oninput = save);
    }

    function addMealRow(data = {g:'', t:'', d:''}) {
        const c = document.getElementById('mealStack');
        const r = document.createElement('div');
        r.className = 'data-row';
        r.innerHTML = `
            <input type="text" class="m-g" value="${data.g||''}" placeholder="GÜN">
            <input type="text" class="m-t" value="${data.t||''}" placeholder="SAAT">
            <input type="text" class="m-d" value="${data.d||''}" placeholder="İÇERİK">
            <button onclick="this.parentElement.remove(); save();" style="background:none; border:none; color:var(--danger)">✕</button>
        `;
        c.appendChild(r);
        r.querySelectorAll('input').forEach(i => i.oninput = save);
    }

    function load() {
        document.getElementById('excStack').innerHTML = ''; document.getElementById('mealStack').innerHTML = '';
        const d = db[actId].days[actDay];
        (d.exc||[]).forEach(x => addExcRow(x)); (d.meals||[]).forEach(x => addMealRow(x));
        updateStats();
    }

    function save() {
        if(!actId) return;
        const exc = []; document.querySelectorAll('#excStack .data-row').forEach(r => {
            const n = r.querySelector('.e-n').value;
            if(n) exc.push({ r: r.querySelector('.e-r').value, n, s: r.querySelector('.e-s').value, t: r.querySelector('.e-t').value, a: r.querySelector('.e-a').value });
        });
        const meals = []; document.querySelectorAll('#mealStack .data-row').forEach(r => {
            const d = r.querySelector('.m-d').value;
            if(d) meals.push({ g: r.querySelector('.m-g').value, t: r.querySelector('.m-t').value, d });
        });
        db[actId].notes = document.getElementById('coachNotes').value;
        db[actId].stats = { h: document.getElementById('s-h').value, w: document.getElementById('s-w').value };
        db[actId].measures = { sh: document.getElementById('o-sh').value, wa: document.getElementById('o-wa').value };
        db[actId].biz = { sess: document.getElementById('f-sess').value, stat: document.getElementById('f-stat').value };
        db[actId].days[actDay] = { exc, meals };
        saveDB(); updateStats();
    }

    function updateStats() {
        let v = 0; document.querySelectorAll('#excStack .data-row').forEach(r => {
            v += ( (parseFloat(r.querySelector('.e-s').value)||0) * (parseFloat(r.querySelector('.e-t').value)||0) * (parseFloat(r.querySelector('.e-a').value)||0) );
        });
        document.getElementById('vol-badge').innerText = `TONAJ: ${v.toLocaleString()} KG`;
    }

    function setPic(type) {
        const u = prompt("URL:"); if(u) { db[actId].photos[type] = u; save(); updatePics(); }
    }

    function updatePics() {
        const p = db[actId].photos || {};
        const ib = document.getElementById('img-before'), ia = document.getElementById('img-after');
        if(p.before) { ib.src = p.before; ib.style.display='block'; } else ib.style.display='none';
        if(p.after) { ia.src = p.after; ia.style.display='block'; } else ia.style.display='none';
    }

    function pushW() {
        const w = parseFloat(document.getElementById('s-w').value);
        if(!isNaN(w)) {
            let h = db[actId].history || []; if(h[h.length-1] !== w) h.push(w);
            if(h.length > 10) h.shift(); db[actId].history = h; buildChart();
        }
        save();
    }

    function buildChart() {
        const ctx = document.getElementById('mainChart').getContext('2d'); if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: (db[actId].history||[]).map((_,i)=>i+1), datasets: [{ label: 'Kilo', data: db[actId].history||[], borderColor: '#38bdf8', tension: 0.4, fill:true, backgroundColor:'rgba(56,189,248,0.05)' }] },
            options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{display:false}, x:{display:false}} }
        });
    }

    function shareWA() {
        let t = `*GYM OF LEGENDS - ${actDay.toUpperCase()}*\n\n`;
        db[actId].days[actDay].exc.forEach(e => t += `- ${e.n}: ${e.s}x${e.t} @ ${e.a}kg\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function saveDB() { localStorage.setItem('gym_v36_native', JSON.stringify(db)); }
    function deleteM(e, id) { e.stopPropagation(); if(confirm("Üyeyi silmek istediğinize emin misiniz?")) { delete db[id]; saveDB(); location.reload(); } }

    drawMembers();
</script>
</body>
</html>
